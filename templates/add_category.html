<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Category - Pharma Choice</title>
    <link href="../static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/addcategory">Add Category</a>
        <a href="/admin/viewcategory">View Category</a>
        <a href="/admin/adddrug">Add Drug</a>
        <a href="/admin/viewdrugs">View Drugs</a>
        <a href="/admin/vieworders">View Orders</a>
        <a href="/logout">Logout</a>
    </div>
    
    <div class="form-container">
        <h2>Add Category</h2>
        
        <form action="/admin/addcategory" method="POST">
            <div class="form-group">
                <label>Enter Category Name</label>
                <input type="text" name="category_name" required>
            </div>
            
            <button type="submit" class="btn-submit">Save Category</button>
        </form>
    </div>
</body>
</html>
