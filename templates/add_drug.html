<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Drug - Pharma Choice</title>
    <link href="../static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/addcategory">Add Category</a>
        <a href="/admin/viewcategory">View Category</a>
        <a href="/admin/adddrug">Add Drug</a>
        <a href="/admin/viewdrugs">View Drugs</a>
        <a href="/admin/vieworders">View Orders</a>
        <a href="/logout">Logout</a>
    </div>
    
    <div class="form-container">
        <h2>Add New Drug</h2>
        
        <form action="/admin/adddrug" method="POST">
            <div class="form-group">
                <label>Drug Name</label>
                <input type="text" name="drug_name" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select name="category_id" required>
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.category_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" name="price" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Discount (%)</label>
                <input type="number" name="discount" step="0.01" value="0">
            </div>
            
            <div class="form-group">
                <label>Available Stock</label>
                <input type="number" name="available_stock" required>
            </div>
            
            <button type="submit" class="btn-submit">Save Drug</button>
        </form>
    </div>
</body>
</html>
